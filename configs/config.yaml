fusion_modes: [mlp, cross_attention, concat]
train_scope: all
# init_checkpoint: null
batch_size: 64
n_epochs: 80
lr: 0.001
weight_decay: 0.0005
neg_samples: 1
data_size_ratio: 1
use_cuda: true
num_workers: 2
sumgnn_dir: /workspace/sum-gnn
output_root: outputs/checkpoints
target_train_loss: 0.3
target_train_acc: 0.8
early_stop_on_target: true
skip_completed: true
stop_on_error: false
wait_for_existing_train: true
